services:
  api-node:
    build: ./api-node
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  api-go:
    build: ./api-go
    ports:
      - "8080:8080"
    environment:
      - NODE_API_URL=http://api-node:3000
    depends_on:
      api-node:
        condition: service_healthy
